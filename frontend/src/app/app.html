@if (authService.isAuthenticated()) {
  <mat-toolbar color="primary" class="app-toolbar">
    <span class="app-title">Uni Portal</span>

    <nav class="app-nav">
  <a mat-button routerLink="/dashboard" routerLinkActive="active-link">
    Dashboard
  </a>
  <a mat-button routerLink="/courses" routerLinkActive="active-link">
    Courses
  </a>
  <a mat-button routerLink="/profile" routerLinkActive="active-link">
    Profile
  </a>
  @if (authService.role() === 'admin') {
    <a mat-button routerLink="/admin/users" routerLinkActive="active-link">
      <mat-icon>admin_panel_settings</mat-icon>
      Users
    </a>
  }
</nav>

    <span class="spacer"></span>

    <button mat-button [matMenuTriggerFor]="userMenu" class="user-btn">
      <mat-icon>account_circle</mat-icon>
      <span class="username">{{ authService.currentUser()?.username }}</span>
    </button>
    <mat-menu #userMenu="matMenu">
      <div class="menu-role">Роль: {{ authService.role() }}</div>
      <button mat-menu-item (click)="onLogout()">
        <mat-icon>logout</mat-icon>
        <span>Выйти</span>
      </button>
    </mat-menu>
  </mat-toolbar>
}

<main class="app-content">
  <router-outlet></router-outlet>
</main>
